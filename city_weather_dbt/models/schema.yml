version: 2

models:
  - name: stg_weather
    description: "Staged weather data with Celsius and Fahrenheit conversions. Filtered for years >= 2020."
    columns:
      - name: date
        description: "The timestamp of the weather observation."
        tests:
          - not_null
      - name: city
        description: "The city name, standardized to Title Case."
        tests:
          - not_null
      - name: temp_celsius
        description: "Average temperature in degrees Celsius."
        tests:
          - not_null
      - name: temp_fahrenheit
        description: "Average temperature converted to degrees Fahrenheit."

  - name: fct_monthly_city_stats
    description: "Monthly aggregated weather stats for cities. Gold layer table."
    columns:
      - name: monthly_avg_temp_c
        description: "The average temperature for the month in Celsius."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: -60
              max_value: 60
              inclusive: true
      - name: days_recorded
        description: "Number of days with measurements in this month."
        tests:
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 31