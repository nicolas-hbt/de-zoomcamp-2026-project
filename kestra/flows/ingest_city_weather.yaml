id: weather_ingestion
namespace: company.data.weather

tasks:
  - id: ingest_to_gcs
    type: io.kestra.plugin.scripts.python.Script
    containerImage: python:3.11-slim
    beforeCommands:
      - pip install requests pandas openpyxl google-cloud-storage pyarrow
    env:
      GCP_CREDS: "{{ secret('GCP_SERVICE_ACCOUNT') }}"
      BUCKET: "{{ kv('GCP_BUCKET_NAME') }}"
    script: |
      import requests
      import pandas as pd
      import io, os, json
      from google.cloud import storage
      from google.oauth2 import service_account

      # 1. Download & Process
      r = requests.get("https://www.fetchseries.com/climate/average-city-temperatures-fsr/average-city-temperatures-fsr.xlsx")
      df = pd.read_excel(io.BytesIO(r.content), engine='openpyxl')
      df = df.drop(columns=[df.columns[0]])
      df.rename(columns={df.columns[0]: 'date'}, inplace=True)
      df['date'] = pd.to_datetime(df['date'])

      # 2. Unpivot & Extract
      df = df.melt(id_vars=['date'], var_name='raw_location', value_name='avg_temp')
      location_parts = df['raw_location'].str.split(' - ', expand=True)
      df['country'] = location_parts[1].str.strip().str.title()
      df['city'] = location_parts[0].str.extract(r'in\s+(.*?)\s+\(')[0].str.strip().str.title()

      # 3. Filter & Clean
      df = df[df['date'].dt.year >= 2020]
      df = df.dropna(subset=['city', 'country', 'avg_temp'])
      df['avg_temp'] = pd.to_numeric(df['avg_temp'], errors='coerce')

      # 4. Upload
      creds_dict = json.loads(os.environ["GCP_CREDS"])
      client = storage.Client(credentials=service_account.Credentials.from_service_account_info(creds_dict), project=creds_dict['project_id'])
      blob_name = f"raw/climate/{{ execution.startDate | date('yyyy-MM-dd') }}_weather.parquet"
      bucket = client.bucket(os.environ["BUCKET"])
      
      with io.BytesIO() as buffer:
          df.to_parquet(buffer, index=False, engine='pyarrow')
          buffer.seek(0)
          bucket.blob(blob_name).upload_from_file(buffer, content_type="application/octet-stream")

  - id: update_bigquery
    type: io.kestra.plugin.gcp.bigquery.Query
    serviceAccount: "{{ secret('GCP_SERVICE_ACCOUNT') }}"
    projectId: "{{ kv('GCP_PROJECT_ID') }}"
    location: "{{ kv('GCP_LOCATION') }}"
    sql: |
      -- 1. Refresh External Table (points to all files in GCS)
      CREATE OR REPLACE EXTERNAL TABLE `{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.ext_weather`
      OPTIONS (
        format = 'PARQUET',
        uris = ['gs://{{ kv('GCP_BUCKET_NAME') }}/raw/climate/*.parquet']
      );

      -- 2. Create optimized table if it doesn't exist
      CREATE TABLE IF NOT EXISTS `{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.city_weather_optimized`
      (
        date TIMESTAMP,
        city STRING,
        country STRING,
        avg_temp FLOAT64
      )
      PARTITION BY DATE(date)
      CLUSTER BY country, city;

      -- 3. Merge new data from GCS into our optimized table
      MERGE INTO `{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.city_weather_optimized` T
      USING `{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.ext_weather` S
      ON T.date = S.date AND T.city = S.city AND T.country = S.country
      WHEN NOT MATCHED THEN
        INSERT (date, city, country, avg_temp)
        VALUES (S.date, S.city, S.country, S.avg_temp);

triggers:
  - id: daily_7am
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 7 * * *"